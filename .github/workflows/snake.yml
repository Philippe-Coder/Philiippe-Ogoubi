name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # Se lance automatiquement chaque jour à minuit
  workflow_dispatch:        # Permet aussi de le lancer manuellement

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

---

### Étape 3 — Autoriser GitHub Actions à écrire

C'est l'étape que beaucoup oublient :

1. Va dans ton repo → **Settings**
2. Clique **Actions** → **General** dans le menu gauche
3. Descends jusqu'à **"Workflow permissions"**
4. Sélectionne **"Read and write permissions"**
5. Clique **Save**

---

### Étape 4 — Lancer manuellement la première fois

Le programme est configuré pour tourner chaque nuit automatiquement, mais la première fois tu dois le lancer toi-même :

1. Va dans l'onglet **Actions** de ton repo
2. Clique sur **"Generate Snake Animation"** dans la liste à gauche
3. Clique le bouton **"Run workflow"** → **"Run workflow"**
4. Attends 1-2 minutes
5. Une branche `output` va apparaître dans ton repo avec les fichiers SVG générés

---

